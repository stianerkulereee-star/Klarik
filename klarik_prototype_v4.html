<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klarik – HELFO-dokumentasjon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0b;
  --bg-2: #111113;
  --bg-3: #161618;
  --bg-4: #1c1c1f;
  --line: rgba(255,255,255,0.07);
  --line-2: rgba(255,255,255,0.12);
  --text-1: #e8e8ed;
  --text-2: #8e8e9a;
  --text-3: #4a4a57;
  --accent: #5b67ca;
  --accent-dim: rgba(91,103,202,0.12);
  --accent-border: rgba(91,103,202,0.25);
  --green: #3dd68c;
  --orange: #f0a623;
  --red: #e5484d;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text-1);
  font-family: 'Inter', -apple-system, sans-serif;
  min-height: 100vh;
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* NAV */
.nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,11,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
  padding: 0 24px;
  height: 48px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-logo img {
  height: 22px;
  width: auto;
  filter: brightness(0) invert(1);
}

.nav-logo-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-1);
  letter-spacing: -0.2px;
}

.nav-sep {
  width: 1px;
  height: 16px;
  background: var(--line-2);
  margin: 0 4px;
}

.nav-sub {
  font-size: 12px;
  color: var(--text-3);
  font-family: 'JetBrains Mono', monospace;
}

.nav-pill {
  margin-left: auto;
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-3);
  border: 1px solid var(--line-2);
  padding: 2px 8px;
  border-radius: 100px;
}

/* MAIN */
.main {
  max-width: 640px;
  margin: 0 auto;
  padding: 40px 20px 80px;
}

/* API */
.api-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 12px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 6px;
  margin-bottom: 32px;
}

.api-label {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  white-space: nowrap;
}

.api-input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text-2);
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  outline: none;
  width: 100%;
}

.api-input::placeholder { color: var(--text-3); }

/* FORM GROUP */
.group {
  margin-bottom: 2px;
}

.group-label {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 0 0 6px;
  display: block;
}

/* BLOCK */
.block {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 8px;
}

.block-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--line);
}

.step-n {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-2);
  background: var(--bg-4);
  border: 1px solid var(--line-2);
  width: 18px; height: 18px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-weight: 500;
}

.block-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-1);
}

.block-hint {
  margin-left: auto;
  font-size: 11px;
  color: var(--text-3);
}

.block-body { padding: 24px; }

/* FIELDS */
.f { margin-bottom: 20px; }
.f:last-child { margin-bottom: 0; }

.fl {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-2);
  margin-bottom: 7px;
  letter-spacing: -0.1px;
}

.fr { color: var(--accent); margin-left: 2px; font-weight: 400; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

select, input[type="text"], input[type="number"], textarea {
  width: 100%;
  background: var(--bg-3);
  border: 1px solid var(--line);
  border-radius: 6px;
  color: var(--text-1);
  font-size: 13px;
  font-family: 'Inter', sans-serif;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.12s;
  appearance: none;
}

select:focus, input:focus, textarea:focus {
  border-color: var(--line-2);
}

select { cursor: pointer; }
select option { background: var(--bg-3); }
textarea { resize: vertical; min-height: 64px; line-height: 1.6; }
input::placeholder, textarea::placeholder { color: var(--text-3); }

.sw { position: relative; }
.sw::after {
  content: '⌄';
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-54%);
  color: var(--text-3);
  pointer-events: none;
  font-size: 13px;
}

/* CHECKBOXES */
.cg { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }

.ci {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  background: var(--bg-3);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  font-size: 12px;
  color: var(--text-1);
  user-select: none;
  min-width: 0;
  white-space: normal;
}

.ci:hover { border-color: rgba(255,255,255,0.25); background: var(--bg-4); }
.ci input { display: none; }

.cb {
  width: 16px; height: 16px;
  border: 1.5px solid rgba(255,255,255,0.3);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.1s;
  background: var(--bg-4);
}

.ci.is-checked {
  border-color: var(--accent-border);
  background: var(--accent-dim);
  color: var(--text-1);
}

.ci.is-checked .cb {
  background: var(--accent);
  border-color: var(--accent);
}

.ci.is-checked .cb::after {
  content: '';
  width: 7px; height: 4px;
  border-left: 1.5px solid white;
  border-bottom: 1.5px solid white;
  transform: rotate(-45deg) translateY(-1px);
}

/* BUTTON */
.submit-btn {
  width: 100%;
  background: var(--text-1);
  color: var(--bg);
  border: none;
  border-radius: 6px;
  padding: 9px 18px;
  font-size: 13px;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all 0.12s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  margin-top: 10px;
  letter-spacing: -0.2px;
}

.submit-btn:hover:not(:disabled) {
  background: white;
  transform: translateY(-1px);
}

.submit-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

.spinner {
  width: 13px; height: 13px;
  border: 1.5px solid rgba(0,0,0,0.2);
  border-top-color: var(--bg);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ERROR */
.err {
  background: rgba(229,72,77,0.08);
  border: 1px solid rgba(229,72,77,0.2);
  border-radius: 5px;
  padding: 9px 12px;
  font-size: 12px;
  color: #ff8085;
  display: none;
  margin-top: 8px;
}

.err.show { display: block; }

/* RESULT */
.result {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
  display: none;
  margin-top: 10px;
}

.result.show { display: block; animation: up 0.2s ease; }

@keyframes up {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

.result-head {
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.r-status {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--green);
}

.r-dot {
  width: 5px; height: 5px;
  background: var(--green);
  border-radius: 50%;
  animation: blink 2s infinite;
}

@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

.copy-all-btn {
  font-size: 11px;
  color: var(--text-3);
  background: var(--bg-3);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 3px 8px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all 0.1s;
}

.copy-all-btn:hover { color: var(--text-1); border-color: var(--line-2); }

.result-body { padding: 14px; }

.r-section { margin-bottom: 18px; padding-bottom: 18px; border-bottom: 1px solid var(--line); }
.r-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

.r-label {
  font-size: 9px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 8px;
  font-weight: 500;
}

.r-text {
  font-size: 12px;
  line-height: 1.7;
  color: var(--text-2);
  white-space: pre-wrap;
}

.journal-box {
  background: var(--bg-3);
  border: 1px solid var(--line);
  border-radius: 5px;
  padding: 12px;
  font-size: 12px;
  line-height: 1.8;
  color: var(--text-1);
  white-space: pre-wrap;
  position: relative;
}

.journal-copy {
  position: absolute;
  top: 8px; right: 8px;
  font-size: 10px;
  color: var(--text-3);
  background: var(--bg-4);
  border: 1px solid var(--line);
  border-radius: 3px;
  padding: 2px 7px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all 0.1s;
}

.journal-copy:hover { color: var(--text-1); border-color: var(--line-2); }

.warning-row {
  display: flex; gap: 7px; align-items: flex-start;
  margin-bottom: 5px; font-size: 11px; line-height: 1.5;
  color: var(--text-2);
}

.warning-row:last-child { margin-bottom: 0; }
.w-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--orange); flex-shrink: 0; margin-top: 5px; }
.w-dot.crit { background: var(--red); }

.footer {
  text-align: center;
  padding: 32px 20px;
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-3);
}

@media (max-width: 560px) {
  .grid2, .grid3 { grid-template-columns: 1fr; }
  .cg { grid-template-columns: 1fr; }
}
</style>
</head>

async function analyze() {
  const apiKey = getVal('apiKey');
  const btn = document.getElementById('analyzeBtn');
  const btnText = document.getElementById('btnText');
  const errorBox = document.getElementById('errorBox');

  errorBox.classList.remove('show');

  if (!apiKey) {
    errorBox.textContent = 'Lim inn din OpenAI API-nøkkel øverst.';
    errorBox.classList.add('show');
    return;
  }

  if (!getVal('stonadspunkt')) {
    errorBox.textContent = 'Velg et stønadspunkt.';
    errorBox.classList.add('show');
    return;
  }

  btn.disabled = true;
  btnText.innerHTML = '<div class="spinner"></div> Genererer dokumentasjon...';

  try {
    const userPrompt = buildPrompt();

    const response = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'gpt-4o',
        max_tokens: 1500,
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          { role: 'user', content: userPrompt }
        ]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'API-feil');
    }

    const data = await response.json();
    const text = data.choices[0].message.content.trim();
    renderResult(text);

  } catch (err) {
    errorBox.textContent = `Feil: ${err.message}`;
    errorBox.classList.add('show');
  } finally {
    btn.disabled = false;
    btnText.textContent = 'Generer HELFO-dokumentasjon';
  }
}

function renderResult(text) {
  const body = document.getElementById('resultBody');
  const sections = [];
  const lines = text.split('\n');
  let currentSection = null;
  for (const line of lines) {
    if (line.startsWith('## ')) {
      if (currentSection) sections.push(currentSection);
      currentSection = { title: line.replace('## ', '').trim(), content: [] };
    } else if (currentSection) {
      currentSection.content.push(line);
    }
  }
  if (currentSection) sections.push(currentSection);
  if (sections.length === 0) {
    body.innerHTML = `<div class="r-section"><div class="r-text">${text}</div></div>`;
    document.getElementById('resultCard').classList.add('show');
    return;
  }
  let html2 = '';
  for (const section of sections) {
    const content = section.content.join('\n').trim();
    const isJournal = section.title.includes('JOURNALTEKST');
    const isWarning = section.title.includes('MANGLER');
    html2 += `<div class="r-section"><div class="r-label">${section.title}</div>`;
    if (isJournal) {
      html2 += `<div class="journal-box" id="journalText">${content}<button class="journal-copy" onclick="copyJournal()">Kopier</button></div>`;
    } else if (isWarning) {
      const items = content.split('\n').filter(l => l.trim());
      html2 += items.map(item => {
        const isCrit = item.toLowerCase().includes('kritisk');
        const clean = item.replace(/^[-*]\s*/, '');
        return `<div class="warning-row"><div class="w-dot ${isCrit ? 'crit' : ''}"></div><span>${clean}</span></div>`;
      }).join('');
    } else {
      html2 += `<div class="r-text">${content}</div>`;
    }
    html2 += '</div>';
  }
  body.innerHTML = html2;
  document.getElementById('resultCard').classList.add('show');
  document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function copyJournal() {
  const el = document.getElementById('journalText');
  const text = el.innerText.replace('Kopier', '').trim();
  navigator.clipboard.writeText(text);
  const btn = document.querySelector('.journal-copy-btn');
  btn.textContent = 'Kopiert ✓';
  setTimeout(() => btn.textContent = 'Kopier', 2000);
}

function copyAll() {
  navigator.clipboard.writeText(document.getElementById('resultBody').innerText);
  const btn = document.querySelector('.copy-btn');
  btn.textContent = 'Kopiert ✓';
  setTimeout(() => btn.textContent = 'Kopier alt', 2000);
}
</script>
</body>
